<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b1220" />
    <title>Shoe Log</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>👟 Shoe Log</h1>
        <p>Track miles per shoe and know when to replace.</p>
      </header>

      <section class="card dashboard" aria-label="Summary">
        <h2>Dashboard</h2>
        <div id="summary-cards" class="summary-grid"></div>
        <div id="alerts" class="alerts"></div>
      </section>

      <section class="card controls">
        <button id="export-btn" type="button">Export Backup</button>
        <button id="import-btn" type="button" class="btn-muted">Import Backup</button>
        <input id="import-file" type="file" accept="application/json" hidden />
      </section>

      <section class="card">
        <h2>Add Shoe</h2>
        <form id="shoe-form" class="stack" novalidate>
          <label>
            <span class="label">Shoe name</span>
            <input name="name" placeholder="e.g., Daily Trainer" required />
          </label>
          <label>
            <span class="label">Brand / Model</span>
            <input name="model" placeholder="optional" />
          </label>
          <label>
            <span class="label">Starting miles</span>
            <input name="startMiles" inputmode="decimal" type="number" min="0" step="0.1" placeholder="default 0" />
          </label>
          <label>
            <span class="label">Retire at miles</span>
            <input name="retireAt" inputmode="numeric" type="number" min="1" step="1" placeholder="optional (e.g., 400)" />
          </label>
          <p id="shoe-error" class="error" aria-live="polite"></p>
          <button type="submit">Add Shoe</button>
          <p id="shoe-saved" class="saved" aria-live="polite"></p>
        </form>
      </section>

      <section class="card">
        <h2>Log Run</h2>
        <form id="run-form" class="stack" novalidate>
          <label>
            <span class="label">Shoe</span>
            <select name="shoeId" id="run-shoe" required></select>
          </label>
          <label>
            <span class="label">Miles</span>
            <input name="miles" inputmode="decimal" type="number" min="0.1" step="0.1" placeholder="Miles run" required />
          </label>
          <label>
            <span class="label">Date</span>
            <input name="date" type="date" required />
          </label>
          <p id="run-error" class="error" aria-live="polite"></p>
          <button type="submit">Log Miles</button>
          <p id="run-saved" class="saved" aria-live="polite"></p>
        </form>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="card">
        <h2>Your Shoes</h2>
        <div id="shoe-list" class="list"></div>
      </section>

      <section class="card">
        <h2>Recent Runs</h2>
        <div id="run-list" class="list"></div>
      </section>

      <section class="card tiny">
        <p><strong>Privacy:</strong> Your data stays on your device unless you export and share it.</p>
        <p class="meta">All shoe and mileage entries auto-save locally.</p>
        <p><a href="mailto:?subject=Shoe%20Log%20Feedback&body=I%20have%20feedback%20for%20Shoe%20Log%3A%20">Share feedback</a></p>
        <p class="meta">Shoe Log v1.4.0</p>
      </section>
    </main>

    <dialog id="edit-modal" class="modal">
      <form id="edit-form" method="dialog" class="stack">
        <h3 id="edit-title">Edit</h3>
        <div id="edit-fields" class="stack"></div>
        <p id="edit-error" class="error" aria-live="polite"></p>
        <div class="actions modal-actions">
          <button type="button" class="btn-muted" id="edit-cancel">Cancel</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="./app.js"></script>
  </body>
</html>
